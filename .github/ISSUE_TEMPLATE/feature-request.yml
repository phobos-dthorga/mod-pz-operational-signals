name: Feature Request
description: Suggest a new mission type, broadcast format, or system
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see added?
      description: Describe the feature, mission type, or broadcast system you are suggesting.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this relate to?
      options:
        - Mission type (industrial recovery)
        - Mission type (vehicle salvage)
        - Mission type (scientific research)
        - Mission type (survivor assistance)
        - Mission type (infrastructure repair)
        - Radio / broadcast system
        - Operation log / journal
        - New sandbox option
        - Cross-mod compatibility
        - UI / tooltip / translation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Why is this useful?
      description: How does this fit into the mod's radio operations theme?
  - type: textarea
    id: implementation
    attributes:
      label: Implementation ideas (optional)
      description: |
        If you have thoughts on how this could work
        (mission objectives, radio message format, sandbox gating), share them here.
