name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.1 and luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1 luarocks > /dev/null
          sudo luarocks install luacheck > /dev/null

      - name: Lua syntax check
        run: |
          echo "Checking Lua syntax with luac5.1 -p ..."
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! OUTPUT=$(luac5.1 -p "$f" 2>&1); then
              echo "::error file=$f::Lua syntax error: $OUTPUT"
              FAIL=1
            fi
          done < <(find common/media/lua -name '*.lua' -print0)
          exit $FAIL

      - name: Luacheck
        run: luacheck common/media/lua/

      - name: Version consistency (2 locations)
        run: |
          V_ROOT=$(grep -oP 'modversion=\K[0-9]+\.[0-9]+\.[0-9]+' mod.info)
          V_42=$(grep -oP 'modversion=\K[0-9]+\.[0-9]+\.[0-9]+' 42/mod.info)

          echo "mod.info (root)  = $V_ROOT"
          echo "42/mod.info      = $V_42"

          FAIL=0
          if [ "$V_ROOT" != "$V_42" ]; then
            echo "::error::Version mismatch: mod.info=$V_ROOT vs 42/mod.info=$V_42"
            FAIL=1
          fi
          if [ "$FAIL" = "0" ]; then
            echo "All 2 version locations match: $V_ROOT"
          fi
          exit $FAIL

      - name: Sandbox translation completeness (JSON)
        run: |
          python3 <<'PYEOF'
          import re, sys, os

          opts_file = "common/media/sandbox-options.txt"
          trans_file = "42/media/lua/shared/Translate/EN/Sandbox.json"

          if not os.path.isfile(opts_file) or not os.path.isfile(trans_file):
              print("No sandbox options or translations yet — skipping.")
              sys.exit(0)

          with open(opts_file) as f:
              opts_text = f.read()

          with open(trans_file) as f:
              trans_text = f.read()

          fail = False

          option_blocks = re.split(r'\n\s*(?=option\s)', opts_text)
          for block in option_blocks:
              trans_match = re.search(r'translation\s*=\s*(\w+)', block)
              if not trans_match:
                  continue
              key = trans_match.group(1)
              label_key = f"Sandbox_{key}"
              tooltip_key = f"Sandbox_{key}_tooltip"
              if label_key not in trans_text:
                  print(f"::error::Missing JSON translation key: {label_key}")
                  fail = True
              if tooltip_key not in trans_text:
                  print(f"::error::Missing JSON translation key: {tooltip_key}")
                  fail = True

              num_match = re.search(r'numValues\s*=\s*(\d+)', block)
              if num_match:
                  num_values = int(num_match.group(1))
                  for i in range(1, num_values + 1):
                      option_key = f"Sandbox_{key}_option{i}"
                      if option_key not in trans_text:
                          print(f"::error::Missing JSON enum translation key: {option_key}")
                          fail = True

          for m in re.finditer(r'page\s*=\s*(\w+)', opts_text):
              page_key = f"Sandbox_{m.group(1)}"
              if page_key not in trans_text:
                  print(f"::error::Missing JSON page title key: {page_key}")
                  fail = True

          if fail:
              sys.exit(1)
          print("All sandbox translation keys present in JSON.")
          PYEOF

      - name: Icon coverage
        run: |
          python3 <<'PYEOF'
          import re, os, sys, glob

          script_files = glob.glob("common/media/scripts/*.txt") + \
                         glob.glob("common/media/scripts/**/*.txt", recursive=True)
          pos_icons = set()

          for sf in script_files:
              with open(sf) as f:
                  for line in f:
                      m = re.search(r'Icon\s*=\s*(POS_\w+)', line)
                      if m:
                          pos_icons.add(m.group(1))

          if not pos_icons:
              print("No POS icons referenced yet — skipping.")
              sys.exit(0)

          fail = False
          for icon_name in sorted(pos_icons):
              texture_path = f"common/media/textures/Item_{icon_name}.png"
              if not os.path.isfile(texture_path):
                  print(f"::error::Missing texture for Icon={icon_name}: expected {texture_path}")
                  fail = True

          if fail:
              sys.exit(1)
          print(f"All {len(pos_icons)} POS icon(s) have matching textures.")
          PYEOF

      - name: OnCreate callback modules
        run: |
          python3 <<'PYEOF'
          import re, os, sys, glob

          script_files = glob.glob("common/media/scripts/*.txt") + \
                         glob.glob("common/media/scripts/**/*.txt", recursive=True)
          modules = set()

          for sf in script_files:
              with open(sf) as f:
                  for line in f:
                      m = re.search(r'OnCreate\s*=\s*(\w+)\.\w+', line)
                      if m:
                          modules.add(m.group(1))

          if not modules:
              print("No OnCreate callbacks yet — skipping.")
              sys.exit(0)

          lua_files = set()
          for root, dirs, files in os.walk("common/media/lua"):
              for fn in files:
                  if fn.endswith(".lua"):
                      lua_files.add(fn[:-4])

          fail = False
          for mod_name in sorted(modules):
              if mod_name not in lua_files:
                  print(f"::error::OnCreate references module '{mod_name}' but {mod_name}.lua not found under common/media/lua/")
                  fail = True

          if fail:
              sys.exit(1)
          print(f"All {len(modules)} OnCreate module(s) resolved.")
          PYEOF

      - name: Recipe/Item translation coverage
        run: |
          python3 <<'PYEOF'
          import re, json, sys, glob, os

          MODULE = "PhobosOperationalSignals"
          fail = False

          # --- Extract recipe names from script files ---
          recipe_names = set()
          recipe_files = glob.glob("common/media/scripts/recipes/*.txt")
          for sf in recipe_files:
              with open(sf) as f:
                  for m in re.finditer(r'craftRecipe\s+(\w+)', f.read()):
                      recipe_names.add(m.group(1))

          # --- Extract item names from item script files (POS module only) ---
          item_names = set()
          item_files = glob.glob("common/media/scripts/items/*.txt")
          for sf in item_files:
              with open(sf) as f:
                  content = f.read()
              for block in re.finditer(
                  r'module\s+PhobosOperationalSignals\s*\{(.*?)^\}',
                  content, re.DOTALL | re.MULTILINE
              ):
                  for m in re.finditer(r'\bitem\s+(\w+)\s*\{', block.group(1)):
                      item_names.add(m.group(1))

          if not recipe_names and not item_names:
              print("No recipes or items yet — skipping.")
              sys.exit(0)

          print(f"Found {len(recipe_names)} recipes, {len(item_names)} items in scripts")

          # --- Check JSON translations ---
          recipes_json_file = "42/media/lua/shared/Translate/EN/Recipes.json"
          items_json_file = "42/media/lua/shared/Translate/EN/ItemName.json"

          if os.path.isfile(recipes_json_file):
              with open(recipes_json_file) as f:
                  recipes_json = json.load(f)
              for name in sorted(recipe_names):
                  if name not in recipes_json:
                      print(f"::error::Recipes.json missing key: {name}")
                      fail = True

          if os.path.isfile(items_json_file):
              with open(items_json_file) as f:
                  items_json = json.load(f)
              for name in sorted(item_names):
                  qualified = f"{MODULE}.{name}"
                  if qualified not in items_json:
                      print(f"::error::ItemName.json missing key: {qualified}")
                      fail = True

          if fail:
              sys.exit(1)
          print("All recipe/item translation keys present.")
          PYEOF

      - name: Translation key prefix guard (JSON)
        run: |
          python3 <<'PYEOF'
          import json, sys, os

          fail = False
          checks = [
              ("42/media/lua/shared/Translate/EN/Recipes.json", "Recipe_"),
              ("42/media/lua/shared/Translate/EN/ItemName.json", "ItemName_"),
          ]
          for fname, prefix in checks:
              if not os.path.isfile(fname):
                  continue
              with open(fname) as f:
                  data = json.load(f)
              bad = [k for k in data if k.startswith(prefix)]
              if bad:
                  for k in bad[:10]:
                      print(f"::error file={fname}::Key '{k}' has invalid '{prefix}' prefix (should be bare)")
                  if len(bad) > 10:
                      print(f"::error file={fname}::... and {len(bad) - 10} more")
                  fail = True

          if fail:
              sys.exit(1)
          print("No invalid prefixes found in JSON translation files.")
          PYEOF

      - name: Duplicate JSON key detection
        run: |
          python3 <<'PYEOF'
          import json, sys, os, glob

          fail = False
          for f in glob.glob("42/media/lua/shared/Translate/EN/*.json"):
              with open(f) as fh:
                  content = fh.read()
              # json.loads with object_pairs_hook to detect duplicates
              keys = []
              dupes = []
              def detect_dupes(pairs):
                  d = {}
                  for k, v in pairs:
                      if k in d:
                          dupes.append(k)
                      d[k] = v
                  return d
              json.loads(content, object_pairs_hook=detect_dupes)
              if dupes:
                  for k in dupes:
                      print(f"::error file={f}::Duplicate JSON key: '{k}'")
                  fail = True

          if fail:
              sys.exit(1)
          print("No duplicate JSON keys found in translation files.")
          PYEOF

      - name: Constants field existence check
        run: |
          python3 <<'PYEOF'
          import re, os, sys, glob

          # Scan all POS_Constants*.lua files for defined fields
          constants_files = sorted(glob.glob("common/media/lua/shared/POS_Constants*.lua"))
          if not constants_files:
              print("No POS_Constants*.lua found — skipping.")
              sys.exit(0)

          defined = set()
          for cf in constants_files:
              with open(cf) as f:
                  for m in re.finditer(r'POS_Constants\.(\w+)\s*=', f.read()):
                      defined.add(m.group(1))

          print(f"Found {len(defined)} defined POS_Constants fields across {len(constants_files)} files")

          # Scan all Lua files for POS_Constants.FIELD_NAME references
          lua_files = glob.glob("common/media/lua/**/*.lua", recursive=True)
          referenced = {}  # field -> [(file, line_num)]

          for lf in lua_files:
              with open(lf) as f:
                  for i, line in enumerate(f, 1):
                      # Skip comments
                      stripped = line.lstrip()
                      if stripped.startswith("--"):
                          continue
                      for m in re.finditer(r'POS_Constants\.(\w+)', line):
                          field = m.group(1)
                          if field not in referenced:
                              referenced[field] = []
                          referenced[field].append((lf, i))

          fail = False
          for field, locations in sorted(referenced.items()):
              if field not in defined:
                  for lf, line_num in locations[:3]:
                      print(f"::error file={lf},line={line_num}::POS_Constants.{field} is referenced but never defined")
                  if len(locations) > 3:
                      print(f"  ... and {len(locations) - 3} more references")
                  fail = True

          if fail:
              sys.exit(1)
          print(f"All {len(referenced)} referenced POS_Constants fields are defined.")
          PYEOF

      - name: PZ API deny-list scan
        run: python3 .github/pz-api-denylist.py common/media/lua/

      - name: Encoding check (UTF-8)
        run: |
          FAIL=0
          for dir in common/media 42/media; do
            if [ -d "$dir" ]; then
              while IFS= read -r -d '' f; do
                if ! python3 -c "open('$f', encoding='utf-8').read()" 2>/dev/null; then
                  echo "::error file=$f::Non-UTF-8 encoding detected"
                  FAIL=1
                fi
              done < <(find "$dir" \( -name '*.lua' -o -name '*.txt' -o -name '*.json' \) -print0)
            fi
          done
          if [ "$FAIL" = "0" ]; then
            echo "All files are valid UTF-8."
          fi
          exit $FAIL

      - name: Load-time forward-reference guard
        run: |
          echo "Checking for load-time captures of split-file constants..."
          FAIL=0
          # Detect: local X = POS_Constants.Y at file scope (outside functions)
          # These are dangerous when Y is defined in a split file that loads later.
          # Safe pattern: resolve inside functions, not at module load time.
          while IFS= read -r -d '' f; do
            # Only check files that are NOT POS_Constants*.lua themselves
            BASENAME=$(basename "$f")
            if [[ "$BASENAME" == POS_Constants* ]]; then
              continue
            fi
            # Find load-time captures: "local X = POS_Constants.SOMETHING" at top scope
            # Heuristic: lines matching the pattern that are NOT inside a function body
            # We check lines before the first "function " definition
            FIRST_FUNC=$(grep -n "^function \|^local function " "$f" | head -1 | cut -d: -f1)
            if [ -z "$FIRST_FUNC" ]; then
              FIRST_FUNC=9999
            fi
            while IFS=: read -r LINENUM LINE; do
              if [ "$LINENUM" -lt "$FIRST_FUNC" ] 2>/dev/null; then
                # Check if this captures a constant that lives in a split file
                CONST_NAME=$(echo "$LINE" | grep -oP 'POS_Constants\.(\w+)' | head -1)
                if [ -n "$CONST_NAME" ]; then
                  # Check if it does arithmetic (subtraction, addition) which crashes on nil
                  if echo "$LINE" | grep -qP '[-+*/]'; then
                    echo "::warning file=$f,line=$LINENUM::Potentially unsafe load-time arithmetic on split-file constant: $LINE"
                  fi
                fi
              fi
            done < <(grep -n "^local .* = POS_Constants\." "$f")
          done < <(find common/media/lua -name '*.lua' -print0)
          echo "Forward-reference check complete."
          exit $FAIL

      - name: Translation key reference audit
        run: |
          python3 <<'PYEOF'
          import re, json, sys, os, glob

          # Collect all UI_POS_ keys from UI.json
          ui_json = "42/media/lua/shared/Translate/EN/UI.json"
          if not os.path.isfile(ui_json):
              print("No UI.json yet — skipping.")
              sys.exit(0)

          with open(ui_json) as f:
              defined_keys = set(json.load(f).keys())

          # Scan all Lua files for safeGetText("UI_POS_*") references
          referenced_keys = set()
          lua_files = glob.glob("common/media/lua/**/*.lua", recursive=True)

          for lf in lua_files:
              with open(lf, encoding="utf-8", errors="replace") as f:
                  content = f.read()
              # Match: safeGetText("UI_POS_...") and safeGetText('UI_POS_...')
              for m in re.finditer(r'safeGetText\(["\'](["\']?UI_POS_\w+)["\']', content):
                  key = m.group(1).strip("\"'")
                  if key.startswith("UI_POS_"):
                      referenced_keys.add(key)

          # Skip broad "UI_POS_*" in table values — only check safeGetText calls
          # (The broad grep catches dynamic prefixes and template examples)

          # Exclude keys that are dynamically constructed (pattern-based)
          # e.g. "UI_POS_Zone_" .. zoneId — these can't be statically checked
          dynamic_prefixes = [
              "UI_POS_Zone_",
              "UI_POS_Mission_Category_",
              "UI_POS_Mission_Difficulty_",
              "UI_POS_FreeAgent_State_",
              "UI_POS_FreeAgent_Archetype_",
              "UI_POS_FreeAgent_NetPayout",
              "UI_POS_FreeAgent_SigintBonus",
              "UI_POS_Wholesaler_State_",
              "UI_POS_Contract_Kind_",
              "UI_POS_Contract_Urgency_",
              "UI_POS_Contract_Status_",
              "UI_POS_Assignments_Filter",
              "UI_POS_Event_",
              "UI_POS_Market_Cat_",
              "UI_POS_Market_Category_",
              "UI_POS_Market_SubCat_",
              "UI_POS_SubCat_",
              "UI_POS_Agent_Your",
              "UI_POS_MarketEvent_Your",
              "UI_POS_Rumour_",
              "UI_POS_BBS_InvDesc_",
              "UI_POS_Analysis_",
              "UI_POS_Wholesaler_",
          ]

          fail = False
          missing = []
          for key in sorted(referenced_keys):
              if key in defined_keys:
                  continue
              # Skip keys ending with _ (clearly a prefix being concatenated)
              if key.endswith("_"):
                  continue
              # Check if it matches a known dynamic prefix (skip those)
              is_dynamic = False
              for prefix in dynamic_prefixes:
                  if key.startswith(prefix):
                      is_dynamic = True
                      break
              if is_dynamic:
                  continue
              missing.append(key)

          if missing:
              for key in missing:
                  print(f"::error::Referenced translation key not found in UI.json: {key}")
              fail = True

          if fail:
              print(f"FAIL: {len(missing)} missing translation key(s)")
              sys.exit(1)
          else:
              print(f"All {len(referenced_keys)} referenced UI_POS_ keys verified ({len(defined_keys)} defined).")
          PYEOF

      - name: JSON duplicate key check
        run: |
          python3 <<'PYEOF'
          import json, sys, os, glob

          class DuplicateKeyChecker(json.JSONDecoder):
              """JSONDecoder that detects duplicate keys."""
              def __init__(self, *args, **kwargs):
                  super().__init__(*args, object_pairs_hook=self._check_pairs, **kwargs)
                  self.duplicates = []

              def _check_pairs(self, pairs):
                  seen = {}
                  for key, value in pairs:
                      if key in seen:
                          self.duplicates.append(key)
                      seen[key] = value
                  return seen

          fail = False
          patterns = [
              "42/media/lua/shared/Translate/**/*.json",
              "42.14/media/lua/shared/Translate/**/*.json",
              "42.15/media/lua/shared/Translate/**/*.json",
              "common/media/lua/shared/Translate/**/*.json",
          ]
          checked = 0
          for pattern in patterns:
              for filepath in glob.glob(pattern, recursive=True):
                  checked += 1
                  with open(filepath, encoding="utf-8") as f:
                      content = f.read()
                  decoder = DuplicateKeyChecker()
                  try:
                      decoder.decode(content)
                  except json.JSONDecodeError as e:
                      print(f"::error file={filepath}::JSON parse error: {e}")
                      fail = True
                      continue
                  if decoder.duplicates:
                      for dup in decoder.duplicates:
                          print(f"::error file={filepath}::Duplicate key: \"{dup}\"")
                      fail = True

          if checked == 0:
              print("No translation JSON files found — skipping.")
          elif not fail:
              print(f"All {checked} translation JSON file(s) clean — no duplicate keys.")
          sys.exit(1 if fail else 0)
          PYEOF
